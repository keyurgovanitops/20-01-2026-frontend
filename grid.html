<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body{
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* fr - fraction - 1fr 1fr 1fr : jitni space hai usko equally 3 column me deivide kardo */
        /* minmax (min-value, max-value) : minimum jitni hogi usse kam jayega? */
        /* maximum :- jitni specify karoge usse zyada nahi hoga */
        .parent{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(3, 1fr);
            border: 2px solid black;
            width: 50%;
            height: 50%;
        }
        .child{
            border: 2px solid yellow;
        }


    </style>
</head>
<body>
    <div class="parent">
        <div class="child child1">child1</div>
        <div class="child child2">child2</div>
        <div class="child">child3</div>
        <div class="child">child4</div>
        <div class="child">child5</div>
        <div class="child">child6</div>
        <div class="child">child7</div>
        <div class="child">child8</div>
        <div class="child">child9</div>
    </div>
</body>
</html>
